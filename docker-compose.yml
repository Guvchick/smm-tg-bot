x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smm_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smm_bot"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1", "--loglevel", "notice"]
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: deploy/bot/Dockerfile
    env_file:
      - .env
    environment:
      HTTP_ADDR: :8080
      DATABASE_URL: ${BOT_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/smm_bot?sslmode=disable}
      REDIS_ADDR: ${BOT_REDIS_ADDR:-redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    ports:
      - "127.0.0.1:${BOT_HOST_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz | grep -q ok"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging: *default-logging
    restart: on-failure:5

  caddy:
    profiles:
      - caddy
    build:
      context: .
      dockerfile: deploy/caddy/Dockerfile
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
      CADDY_UPSTREAM: ${CADDY_UPSTREAM:-bot:8080}
    ports:
      - "${CADDY_HTTP_PORT:-8081}:80"
      - "${CADDY_HTTPS_PORT:-8444}:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      bot:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:
